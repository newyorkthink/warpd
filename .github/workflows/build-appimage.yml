name: Build AppImage

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/build-appimage.yml
      - Makefile
      - mk/**
      - src/**
      - files/**

permissions:
  contents: write

concurrency:
  group: build-appimage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-appimage:
    name: Build x86_64 AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            g++ \
            pkg-config \
            wget \
            file \
            patchelf \
            desktop-file-utils \
            libxi-dev \
            libxinerama-dev \
            libxft-dev \
            libxfixes-dev \
            libxext-dev \
            libxtst-dev \
            libx11-dev \
            libatspi2.0-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libopencv-dev \
            libgtk-3-dev \
            libgtk-3-bin \
            xclip

          fcitx_gtk_package="$(
            apt-cache search --names-only '^fcitx5.*gtk3' |
              awk 'NR == 1 { print $1 }'
          )"

          if [ -z "$fcitx_gtk_package" ]; then
            echo 'Could not find the Ubuntu Fcitx5 GTK3 frontend package.' >&2
            apt-cache search --names-only 'fcitx5.*gtk' >&2 || true
            exit 1
          fi

          sudo apt-get install -y --no-install-recommends "$fcitx_gtk_package"

          fcitx_gtk_module="$(
            find /usr/lib \
              \( -name 'im-fcitx5.so' -o -name 'im-fcitx.so' \) \
              -print -quit
          )"

          if [ -z "$fcitx_gtk_module" ]; then
            echo 'Fcitx5 GTK3 input module was not installed.' >&2
            exit 1
          fi

          echo "FCITX_GTK_MODULE=$fcitx_gtk_module" >> "$GITHUB_ENV"

      - name: Prepare Ubuntu multiarch include paths
        run: |
          multiarch="$(gcc -print-multiarch)"

          sudo mkdir -p /usr/lib/glib-2.0 /usr/lib/dbus-1.0
          sudo ln -sfn "/usr/lib/${multiarch}/glib-2.0/include" /usr/lib/glib-2.0/include
          sudo ln -sfn "/usr/lib/${multiarch}/dbus-1.0/include" /usr/lib/dbus-1.0/include

      - name: Build warpd and lightweight GTK3 dialog
        run: |
          make clean || true
          make -j"$(nproc)" OPENCV_ENABLE=1 DISABLE_WAYLAND=1

          warpd_bin="$(find bin -maxdepth 1 -type f -name 'warpd-*' -print -quit)"
          test -n "$warpd_bin"
          test -x "$warpd_bin"

          gcc -O2 -Wall -Wextra \
            files/warpd-entry-dialog.c \
            -o warpd-entry-dialog \
            $(pkg-config --cflags --libs gtk+-3.0)
          test -x warpd-entry-dialog

          ldd "$warpd_bin" | tee warpd-ldd.txt
          grep -q 'libopencv_core' warpd-ldd.txt
          grep -q 'libopencv_imgproc' warpd-ldd.txt

          ldd warpd-entry-dialog | tee dialog-ldd.txt
          grep -q 'libgtk-3' dialog-ldd.txt

          version="$(awk -F= '/^VERSION=/{print $2; exit}' Makefile | tr -d '[:space:]')"
          test -n "$version"

          echo "WARPD_BIN=$warpd_bin" >> "$GITHUB_ENV"
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Create AppDir metadata and Fcitx5 runtime
        run: |
          rm -rf AppDir
          mkdir -p \
            AppDir/usr/bin \
            AppDir/usr/lib \
            AppDir/usr/libexec \
            AppDir/usr/lib/gtk-3.0/3.0.0/immodules \
            AppDir/usr/share/man/man1 \
            AppDir/apprun-hooks

          install -m755 "$WARPD_BIN" AppDir/usr/bin/warpd
          install -m755 warpd-entry-dialog AppDir/usr/libexec/warpd-entry-dialog
          install -m755 "$(command -v xclip)" AppDir/usr/bin/xclip

          fcitx_module_name="$(basename "$FCITX_GTK_MODULE")"
          fcitx_module_dest="AppDir/usr/lib/gtk-3.0/3.0.0/immodules/$fcitx_module_name"
          install -m755 "$FCITX_GTK_MODULE" "$fcitx_module_dest"

          # The GTK input module is loaded dynamically, so linuxdeploy does not
          # reliably discover its private Fcitx5 libraries. Copy its complete
          # Fcitx5 dependency closure explicitly.
          fcitx_runtime_libs="$(
            ldd "$FCITX_GTK_MODULE" |
              awk '$1 ~ /^libFcitx5/ && $2 == "=>" && $3 ~ /^\// { print $3 }'
          )"
          test -n "$fcitx_runtime_libs"

          while IFS= read -r library; do
            [ -n "$library" ] || continue
            install -m755 "$library" "AppDir/usr/lib/$(basename "$library")"
          done <<EOF_FCITX_LIBS
          $fcitx_runtime_libs
          EOF_FCITX_LIBS

          find AppDir/usr/lib -maxdepth 1 -name 'libFcitx5GClient.so*' -print | grep -q .

          gtk_query="$(command -v gtk-query-immodules-3.0 || true)"
          if [ -z "$gtk_query" ]; then
            gtk_query="$(find /usr/lib -type f -name gtk-query-immodules-3.0 -print -quit)"
          fi
          test -n "$gtk_query"

          cache_template="AppDir/usr/lib/gtk-3.0/3.0.0/immodules.cache.template"
          "$gtk_query" "$FCITX_GTK_MODULE" > "$cache_template"

          FCITX_MODULE_DEST_REL="usr/lib/gtk-3.0/3.0.0/immodules/$fcitx_module_name" \
          python3 - <<'PY'
          import os
          from pathlib import Path

          source = os.environ["FCITX_GTK_MODULE"]
          destination = "@APPDIR@/" + os.environ["FCITX_MODULE_DEST_REL"]
          path = Path("AppDir/usr/lib/gtk-3.0/3.0.0/immodules.cache.template")
          content = path.read_text()

          if source not in content:
              raise SystemExit("Fcitx5 module path was not written to GTK cache")

          path.write_text(content.replace(source, destination))
          PY

          fcitx_context="$(
            awk -F'"' '
              /^"/ {
                quoted_line++
                if (quoted_line == 2) {
                  print $2
                  exit
                }
              }
            ' "$cache_template"
          )"
          test -n "$fcitx_context"
          printf '%s\n' "$fcitx_context" \
            > AppDir/usr/lib/gtk-3.0/3.0.0/fcitx-context-name

          cat > AppDir/usr/bin/zenity <<'EOF'
          #!/bin/sh
          set -eu

          self="$(readlink -f "$0")"
          appdir="${APPDIR:-$(CDPATH= cd -- "$(dirname -- "$self")/../.." && pwd)}"
          runtime_base="${XDG_RUNTIME_DIR:-/tmp}/warpd-gtk-$(id -u)"
          config_dir="$runtime_base/config"
          cache_file="$runtime_base/immodules.cache"
          cache_template="$appdir/usr/lib/gtk-3.0/3.0.0/immodules.cache.template"
          context_file="$appdir/usr/lib/gtk-3.0/3.0.0/fcitx-context-name"

          mkdir -p "$config_dir/gtk-3.0"
          chmod 700 "$runtime_base" "$config_dir" "$config_dir/gtk-3.0" 2>/dev/null || true

          cat > "$config_dir/gtk-3.0/settings.ini" <<'SETTINGS'
          [Settings]
          gtk-theme-name=Adwaita
          gtk-application-prefer-dark-theme=1
          SETTINGS

          sed "s#@APPDIR@#$appdir#g" "$cache_template" > "$cache_file"

          # Text selected by warpd's drag mode is stored in the X11 PRIMARY
          # selection. Read it directly instead of injecting Ctrl+Insert.
          initial_text="$(xclip -o -selection primary 2>/dev/null || true)"

          export WARPD_ENTRY_TEXT="$initial_text"
          export XDG_CONFIG_HOME="$config_dir"
          export GTK_THEME='Adwaita:dark'
          export GTK_PATH="$appdir/usr/lib/gtk-3.0${GTK_PATH:+:$GTK_PATH}"
          export GTK_IM_MODULE_FILE="$cache_file"
          export GTK_IM_MODULE="$(cat "$context_file")"
          export XMODIFIERS='@im=fcitx'
          export LD_LIBRARY_PATH="$appdir/usr/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

          exec "$appdir/usr/libexec/warpd-entry-dialog" "$@"
          EOF
          chmod +x AppDir/usr/bin/zenity

          if [ -f files/warpd.1.gz ]; then
            install -m644 files/warpd.1.gz AppDir/usr/share/man/man1/warpd.1.gz
          fi

          cat > AppDir/apprun-hooks/00-bundled-tools.sh <<'EOF'
          export PATH="$this_dir/usr/bin:${PATH:-/usr/bin:/bin}"
          EOF

          echo "FCITX_MODULE_DEST=$fcitx_module_dest" >> "$GITHUB_ENV"

          cat > warpd.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=warpd
          Comment=Keyboard-driven mouse control with Smart Hint
          Exec=warpd
          Icon=warpd
          Terminal=false
          Categories=Utility;Accessibility;
          EOF

          cat > warpd.svg <<'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
            <rect width="256" height="256" rx="48" fill="#202124"/>
            <path d="M66 40v142l39-34 27 62 28-13-27-61 51-4z" fill="#f1f3f4" stroke="#202124" stroke-width="10" stroke-linejoin="round"/>
          </svg>
          EOF

          desktop-file-validate warpd.desktop

      - name: Package AppImage and bundle runtime libraries
        run: |
          wget -q \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -O linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/warpd \
            --executable AppDir/usr/libexec/warpd-entry-dialog \
            --executable AppDir/usr/bin/xclip \
            --library "$FCITX_MODULE_DEST" \
            --desktop-file warpd.desktop \
            --icon-file warpd.svg \
            --output appimage

          generated="$(find . -maxdepth 1 -type f -name 'warpd*.AppImage' -print -quit)"
          test -n "$generated"

          output="warpd-${VERSION}-x86_64.AppImage"
          if [ "$(basename "$generated")" != "$output" ]; then
            mv -- "$generated" "$output"
          fi
          test -f "$output"
          chmod +x "$output"
          echo "APPIMAGE_PATH=$output" >> "$GITHUB_ENV"

      - name: Verify bundled runtime
        run: |
          rm -rf squashfs-root
          "./$APPIMAGE_PATH" --appimage-extract >/dev/null

          test -x squashfs-root/usr/bin/warpd
          test -x squashfs-root/usr/bin/zenity
          test -x squashfs-root/usr/libexec/warpd-entry-dialog
          test -x squashfs-root/usr/bin/xclip
          test -f squashfs-root/apprun-hooks/00-bundled-tools.sh
          test -f squashfs-root/usr/lib/gtk-3.0/3.0.0/immodules.cache.template
          test -f squashfs-root/usr/lib/gtk-3.0/3.0.0/fcitx-context-name

          fcitx_module="$(
            find squashfs-root/usr/lib/gtk-3.0/3.0.0/immodules \
              \( -name 'im-fcitx5.so' -o -name 'im-fcitx.so' \) \
              -print -quit
          )"
          test -n "$fcitx_module"

          find squashfs-root -name 'libopencv_core.so*' -print | grep -q .
          find squashfs-root -name 'libopencv_imgproc.so*' -print | grep -q .
          find squashfs-root -name 'libgtk-3.so*' -print | grep -q .
          find squashfs-root/usr/lib -maxdepth 1 -name 'libFcitx5GClient.so*' -print | grep -q .

          runtime_lib_path="$PWD/squashfs-root/usr/lib:$PWD/squashfs-root/usr/lib/x86_64-linux-gnu"

          for executable in \
            squashfs-root/usr/bin/warpd \
            squashfs-root/usr/libexec/warpd-entry-dialog \
            squashfs-root/usr/bin/xclip \
            "$fcitx_module"; do
            output_name="$(basename "$executable")-bundled-ldd.txt"
            LD_LIBRARY_PATH="$runtime_lib_path" ldd "$executable" | tee "$output_name"
            if grep -q 'not found' "$output_name"; then
              echo "Missing bundled library for $executable" >&2
              exit 1
            fi
          done

          if find squashfs-root -name 'libwebkit2gtk*.so*' -print | grep -q .; then
            echo 'Unexpected WebKitGTK library was bundled' >&2
            exit 1
          fi

          file "$APPIMAGE_PATH"
          du -h "$APPIMAGE_PATH"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: warpd-${{ env.VERSION }}-x86_64
          path: ${{ env.APPIMAGE_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="appimage"
          title="warpd ${VERSION} AppImage"
          notes="X11 x86_64 AppImage with bundled OpenCV, AT-SPI, xclip, complete Fcitx5 GTK3 runtime, dark insert dialog and X11 PRIMARY selection prefill. No IBus, Zenity or WebKitGTK runtime dependency."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$APPIMAGE_PATH" --clobber
            gh release edit "$tag" \
              --title "$title" \
              --notes "$notes" \
              --prerelease
          else
            gh release create "$tag" "$APPIMAGE_PATH" \
              --target "$GITHUB_SHA" \
              --title "$title" \
              --notes "$notes" \
              --prerelease
          fi
